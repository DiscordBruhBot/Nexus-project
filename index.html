<!DOCTYPE html>

<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    

    <meta name="yandex-verification" content="78781c3502b03a49" />



    <title>NEXUS AI | Thinking Wave v.21.8</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>

        :root { --p: #ffffff; --bg: #000000; }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; overflow: hidden; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }

        #cosmos { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 10; pointer-events: none; }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.6; }

        .comet { position: absolute; width: 1px; background: linear-gradient(180deg, rgba(255,255,255,0.8), transparent); }

        #core-star { position: absolute; width: 160px; height: 160px; background: white; border-radius: 50%; box-shadow: 0 0 60px white, 0 0 100px white; z-index: 100; top: -200px; left: 50%; transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center; }

        #core-star span { color: black; font-family: 'Orbitron'; font-weight: 900; font-size: 22px; opacity: 0; }

        #hub-menu { display: none; position: absolute; gap: 35px; z-index: 500; }

        .hub-btn { width: 140px; height: 140px; border-radius: 50%; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; opacity: 0; transform: scale(0.5); }

        .hub-btn b { font-size: 40px; color: #000; }

        .hub-btn span { font-family: 'Orbitron'; font-size: 10px; color: #000; margin-top: 8px; font-weight: 900; }

        .nexus-box { display: none; position: absolute; width: min(400px, 90vw); background: rgba(0,0,0,0.95); border: 2px solid #fff; border-radius: 20px; padding: 25px; z-index: 1000; text-align: center; }

        #res { height: 250px; overflow-y: auto; text-align: left; margin-bottom: 15px; border-bottom: 1px solid #333; font-size: 14px; padding-right: 5px; }

        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; margin-bottom: 10px; box-sizing: border-box; }

        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #fff; color: #000; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; }

        .dot { display: inline-block; animation: wave 1s infinite; }

        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

    </style>

</head>

<body>

    <div id="cosmos"></div>

    <div id="core-star"><span>START</span></div>

    <div id="chat-trigger" style="position:absolute; z-index:150; width:160px; height:160px; cursor:pointer; top:50%; left:50%; transform:translate(-50%, -50%); display:none" onclick="detonate()"></div>

    <div id="hub-menu">

        <div class="hub-btn" onclick="openModule('chat')"><b>💬</b><span>NEURAL LINK</span></div>

        <div class="hub-btn" onclick="openModule('status')"><b>⚙️</b><span>SYSTEM</span></div>

    </div>

    <div class="nexus-box" id="chat-box">

        <h2 style="font-family:Orbitron; font-size:18px;">NEURAL LINK</h2>

        <div id="res"></div>

        <input id="c-in" placeholder="Сигнал...">

        <button onclick="sendChat()">ОТПРАВИТЬ</button>

        <button style="background:none; color:#fff; border:1px solid #fff; margin-top:10px" onclick="closeModule('chat')">НАЗАД</button>

    </div>

    <div class="nexus-box" id="status-box">

        <h2 style="font-family:Orbitron">SYSTEM STATUS</h2>

        <p style="font-family:monospace; text-align:left">> HOST: DISCORDBRUHBOT<br>> PROJECT: NEXUS v.21.8<br>> YANDEX KEY: 7878...3a49<br>> STATUS: VERIFIED</p>

        <button onclick="closeModule('status')">ЗАКРЫТЬ</button>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>

        const particles = [];

        function createCosmos() {

            for (let i = 0; i < 150; i++) {

                const s = document.createElement('div');

                s.className = Math.random() > 0.9 ? 'comet' : 'star';

                s.style.left = Math.random() * 100 + 'vw';

                s.style.top = Math.random() * -100 + 'vh';

                const size = Math.random() * 3 + 1;

                s.style.width = size + 'px';

                s.style.height = s.className === 'comet' ? (Math.random()*50+30)+'px' : size + 'px';

                document.getElementById('cosmos').appendChild(s);

                particles.push({el: s, speed: Math.random() * 2 + 1});

            }

        }

        function animateStars() {

            particles.forEach(s => {

                let t = parseFloat(s.el.style.top); t += s.speed;

                if (t > window.innerHeight) { t = -100; s.el.style.left = Math.random() * 100 + 'vw'; }

                s.el.style.top = t + 'px';

            });

            requestAnimationFrame(animateStars);

        }

        window.onload = () => {

            createCosmos(); animateStars();

            gsap.timeline().to('#core-star', {top:'50%', duration:1.5, ease:'back.out(1.7)'}).to('#core-star span', {opacity:1}).set('#chat-trigger', {display:'block'});

        };

        function detonate() {

            gsap.to('#core-star', {scale:20, opacity:0, duration:0.6});

            document.getElementById('chat-trigger').style.display='none';

            setTimeout(() => { document.getElementById('hub-menu').style.display='flex'; gsap.to('.hub-btn', {opacity:1, scale:1, stagger:0.2}); }, 400);

        }

        function openModule(id) { document.getElementById('hub-menu').style.display='none'; document.getElementById(id+'-box').style.display='block'; }

        function closeModule(id) { document.getElementById(id+'-box').style.display='none'; document.getElementById('hub-menu').style.display='flex'; }

        async function sendChat() {

            const i = document.getElementById('c-in'), r = document.getElementById('res');

            if(!i.value) return;

            const m = i.value; i.value = '';

            r.innerHTML += `<div><b>Вы:</b> ${m}</div>`;

            const t = document.createElement('div'); t.innerHTML = `<b>Nexus:</b> <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>`;

            r.appendChild(t);

            try {

                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(m)}?model=openai&system=Nexus assistant. Short and mysterious.`);

                const txt = await res.text();

                t.innerHTML = `<b>Nexus:</b> ${txt}`;

            } catch { t.innerHTML = `<b>Nexus:</b> Система перегружена.`; }

            r.scrollTop = r.scrollHeight;

        }

    </script>

</body>

</html>
